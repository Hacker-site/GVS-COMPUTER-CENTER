<body class="admin-body">

        <div class="nav-container">

    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage Students & Results</p>
        </div>

        <div class="admin-buttons">
            <button class="admin-btn primary" onclick="showAddStudentForm()">➕ Add Student</button>
            <button class="admin-btn secondary" onclick="showAllStudents()">👥 All Students</button>
            <button class="admin-btn success" onclick="showUploadMarksheet()">📄 Upload Marksheet</button>
        </div>

        <!-- Students List -->
        <div id="studentsList" class="students-grid" style="display: none;"></div>

        <!-- Add Student Form -->
        <div id="addStudentForm" class="admin-form" style="display: none;">
            <h3>Add New Student</h3>
            <input type="text" id="newStudentName" placeholder="Student Name">
            <input type="text" id="newStudentRollNo" placeholder="Roll Number (Optional)">
            <input type="password" id="newStudentPassword" placeholder="Password">
            <button onclick="addNewStudent()">Add Student</button>
            <button onclick="hideAddStudentForm()" class="cancel-btn">Cancel</button>
        </div>
    </div>
